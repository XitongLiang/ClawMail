<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Shadow/depth base -->
  <ellipse cx="60" cy="108" rx="28" ry="6" fill="#00000022"/>

  <!-- Tail fan -->
  <ellipse cx="60" cy="100" rx="14" ry="7" fill="#B03A2E"/>
  <path d="M46 100 Q38 108 34 103 Q40 95 46 98Z" fill="#D94F3D" stroke="#2C1810" stroke-width="1"/>
  <path d="M74 100 Q82 108 86 103 Q80 95 74 98Z" fill="#D94F3D" stroke="#2C1810" stroke-width="1"/>
  <path d="M51 101 Q45 112 42 108 Q47 100 51 100Z" fill="#C44332" stroke="#2C1810" stroke-width="0.8"/>
  <path d="M69 101 Q75 112 78 108 Q73 100 69 100Z" fill="#C44332" stroke="#2C1810" stroke-width="0.8"/>
  <path d="M57 102 Q56 114 60 114 Q64 114 63 102Z" fill="#D94F3D" stroke="#2C1810" stroke-width="0.8"/>

  <!-- Body -->
  <ellipse cx="60" cy="82" rx="18" ry="22" fill="#D94F3D" stroke="#2C1810" stroke-width="1.5"/>
  <!-- Body segments -->
  <path d="M42 78 Q60 80 78 78" stroke="#B03A2E" stroke-width="1" fill="none"/>
  <path d="M42 84 Q60 86 78 84" stroke="#B03A2E" stroke-width="1" fill="none"/>
  <path d="M43 90 Q60 92 77 90" stroke="#B03A2E" stroke-width="1" fill="none"/>

  <!-- Walking legs (right side) -->
  <line x1="76" y1="78" x2="88" y2="82" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="82" x2="94" y2="78" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="77" y1="84" x2="90" y2="87" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="90" y1="87" x2="96" y2="83" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="90" x2="88" y2="93" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="93" x2="94" y2="90" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Walking legs (left side) -->
  <line x1="44" y1="78" x2="32" y2="82" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="82" x2="26" y2="78" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="84" x2="30" y2="87" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="87" x2="24" y2="83" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="90" x2="32" y2="93" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="93" x2="26" y2="90" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Head/carapace -->
  <ellipse cx="60" cy="58" rx="16" ry="14" fill="#D94F3D" stroke="#2C1810" stroke-width="1.5"/>
  <ellipse cx="60" cy="56" rx="13" ry="10" fill="#E05A48"/>

  <!-- Eyes -->
  <circle cx="53" cy="51" r="4" fill="#2C1810"/>
  <circle cx="67" cy="51" r="4" fill="#2C1810"/>
  <circle cx="52" cy="50" r="1.5" fill="#ffffff"/>
  <circle cx="66" cy="50" r="1.5" fill="#ffffff"/>
  <!-- Eye stalks -->
  <line x1="53" y1="51" x2="51" y2="46" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="67" y1="51" x2="69" y2="46" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Antennae -->
  <path d="M56 46 Q44 30 28 22" stroke="#2C1810" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M64 46 Q76 30 92 22" stroke="#2C1810" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Short antennules -->
  <path d="M57 47 Q50 40 46 36" stroke="#2C1810" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <path d="M63 47 Q70 40 74 36" stroke="#2C1810" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- RIGHT claw (relaxed, lower) -->
  <line x1="76" y1="70" x2="88" y2="68" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="68" x2="96" y2="73" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
  <!-- Claw knuckle -->
  <circle cx="88" cy="68" r="4" fill="#D94F3D" stroke="#2C1810" stroke-width="1.2"/>
  <!-- Claw fingers -->
  <path d="M96 73 Q102 70 100 65 Q96 62 94 67Z" fill="#D94F3D" stroke="#2C1810" stroke-width="1"/>
  <path d="M96 73 Q103 76 102 82 Q97 82 94 77Z" fill="#D94F3D" stroke="#2C1810" stroke-width="1"/>

  <!-- LEFT claw arm (raised, holding envelopes) -->
  <line x1="44" y1="70" x2="30" y2="60" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="60" x2="20" y2="50" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
  <circle cx="30" cy="60" r="4" fill="#D94F3D" stroke="#2C1810" stroke-width="1.2"/>
  <!-- Claw gripping envelopes -->
  <path d="M20 50 Q14 45 16 39 Q21 36 24 42Z" fill="#D94F3D" stroke="#2C1810" stroke-width="1"/>
  <path d="M20 50 Q14 55 16 61 Q21 63 24 57Z" fill="#D94F3D" stroke="#2C1810" stroke-width="1"/>

  <!-- Stack of envelopes held in left claw -->
  <!-- Envelope 3 (bottom, slightly offset) -->
  <rect x="26" y="44" width="26" height="18" rx="2" fill="#f0f0f0" stroke="#2C1810" stroke-width="1"/>
  <path d="M26 44 L39 53 L52 44" stroke="#4A90D9" stroke-width="1.2" fill="none"/>

  <!-- Envelope 2 (middle) -->
  <rect x="27" y="40" width="26" height="18" rx="2" fill="#f8f8f8" stroke="#2C1810" stroke-width="1"/>
  <path d="M27 40 L40 49 L53 40" stroke="#4A90D9" stroke-width="1.2" fill="none"/>

  <!-- Envelope 1 (top, most visible) -->
  <rect x="28" y="36" width="26" height="18" rx="2" fill="#ffffff" stroke="#2C1810" stroke-width="1.2"/>
  <path d="M28 36 L41 46 L54 36" stroke="#4A90D9" stroke-width="1.5" fill="none"/>
  <!-- Envelope lines (content suggestion) -->
  <line x1="32" y1="49" x2="50" y2="49" stroke="#cccccc" stroke-width="0.8"/>
  <line x1="32" y1="52" x2="46" y2="52" stroke="#cccccc" stroke-width="0.8"/>
</svg>
